# Локальная PostgreSQL для разработки:  docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: yastrub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yastrub
      POSTGRES_PASSWORD: yastrub
      POSTGRES_DB: yastrub
    ports:
      - "5432:5432"
    volumes:
      - yastrub_pgdata:/var/lib/postgresql/data

volumes:
  yastrub_pgdata:
